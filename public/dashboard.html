<head>
  <title>Wildfire Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body{
      background: #000000;
      color: #fff;
    }

    nav {
      height: 50px;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .title{
      font-size: 18px;
    }

    nav a {
      color: #808080;
      text-decoration: none;
      font-size: 15px;
      margin-left: 20px;
    }

    .dashboard {
      display: flex;
      height: 100%;
    }

    #map{
      flex: 1;
    }
    .panel {
      width: 280px;
      background: #000000;
      border-left: 1px solid #000000;
      padding: 20px 10px;
    }

    .panel-section{
      margin-bottom: 40px;
      padding-bottom: 40px;
      border-bottom: 1px solid #444444;
    }

    .panel-title {
      font-size: 15px;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .panel-stat {
      font-size: 50px;
    }

    .panel-sub {
      font-size: 15px;
      color: #474747;
    }

    input{
      width: 100%;
      background: #1a1a1a;
      padding: 10px 15px;
      color: #ffffff;
      font-size: 15px;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      background: #232323;
      color: #ffffff;
      border: 1px solid #2b2b2b;
      padding: 10px;
      font-size: 15px;
    }

    button:hover {
      background: #3b3b3b;
    }

    .location-item {
      background: #000000;
      padding: 10px 15px;
      margin-bottom: 10px;
    }

    .location-name {
      font-size: 15px;
      margin-bottom: 5px;
    }
    .location-coords{
      font-size: 15px;
      color: #6e6e6e;
    }
  </style>
</head>
<body>

  <nav>
    <span class="title">Wildfire Tracker</span>
    <div>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <div class="dashboard">

    <div id="map"></div>

    <div class="panel">

      <div class="panel-section">
        <p class="panel-title">ACTIVE FIRES</p>
        <p class="panel-stat" id="fire-count">...</p>
        <p class="panel-sub">hotspots detected in the USA</p>
      </div>

      <div class="panel-section">
        <p class="panel-title">SAVE A LOCATION</p>
        <input type="text"id="loc-name" placeholder="Location name" />
        <input type="text" id="loc-lat"placeholder="Latitude" />
        <input type="text"id="loc-lng" placeholder="Longitude" />
        <button onclick="saveLocation()">Save Location</button>
      </div>

      <div class="panel-section">
        <p class="panel-title">SAVED LOCATIONS</p>
        <div id="locations-list">
          <p class="panel-sub">No saved locations yet.</p>
        </div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map("map").setView([39.5,-98.35],4);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    fetch("/api/fires")
      .then(res => res.json())
      .then(data =>{
        document.getElementById("fire-count").textContent = data.length;

        data.forEach(fire =>{
          L.circleMarker([parseFloat(fire.latitude),parseFloat(fire.longitude)],{
            radius: 4,
            color: "#ff0000",
            fillColor: "#ff0000:",
            fillOpacity: 0.8})
          .bindPopup(
            `<b>Fire Hotspot</b><br>
            Date: ${fire.acq_date}<br>
            Brightness: ${fire.bright_ti4}<br>
            Confidence: ${fire.confidence}`)
          .addTo(map);
        });}).catch(err =>console.error("Error fetching fires:",err));

    function loadLocations() {
      fetch("/api/locations")
        .then(res =>res.json())
        .then(data =>{
          const list =document.getElementById("locations-list");

          if (data.length === 0) {
            list.innerHTML ='<p class="panel-sub">No saved locations yet.</p>';
            return;
          }

          list.innerHTML = "";
          data.forEach(loc =>{
            list.innerHTML += `
              <div class="location-item">
                <p class="location-name">${loc.name}</p>
                <p class="location-coords">${loc.lat}, ${loc.lng}</p>
              </div>`;

            L.circleMarker([loc.lat,loc.lng],{
              radius:6,
              color: "#0000FF",
              fillColor: "#0000FF",
              fillOpacity:0.8
            })
            .bindPopup(loc.name).addTo(map);
          });})
        .catch(err => console.error("Error fetching locations:", err));
    }

    function saveLocation() {
      const name =document.getElementById("loc-name").value;
      const lat =document.getElementById("loc-lat").value;
      const lng =document.getElementById("loc-lng").value;

      if (!name||!lat||!lng){
        alert("please fill in all fields");
        return;
      }

      fetch("/api/locations",{
        method:"POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          name: name,
          lat: parseFloat(lat),lng:parseFloat(lng)
        })
      })
        .then(res => res.json())
        .then(() =>{
          alert("Location saved");
          loadLocations();
        })
        .catch(err => console.error("Error saving location:", err));}
    loadLocations();
  </script>

</body>
</html>

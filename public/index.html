<head>
  <title>Wildfire Tracker</title>
  <style>
    body{
      background: #000000;
      color: #fff;
    }

    nav {
      height: 50px;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }

    .title{
      font-size: 18px;
    }

    nav a {
      color: #808080;
      text-decoration: none;
      font-size: 15px;
      margin-left: 20px;
    }
    .center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 35px;
    }

    .subtitle {
      color: #808080;
      font-size: 15px;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .fire-box{
      border: 1px solid #444444;
      padding: 20px 40px;
      margin-bottom: 20px;
    }

    .fire-title {
      color: #4e4e4e;
      font-size: 10px;
      margin-bottom: 10px;
    }

    .fire-count {
      font-size: 45px;
    }

    .fire-sub{
      color: #515151;
      font-size: 10px;
      margin-top: 10px;
    }
    .btn {
      background: #000000;
      color: #fff;
      text-decoration: none;
      padding: 10px 30px;
      font-size: 15px;
      border: 2px solid #2c2c2c;
    }

    .btn:hover{
      background: #808080;
    }
  </style>
</head>
<body>
  <nav>
    <span class="title">Wildfire Tracker</span>
    <div>
      <a href="/index.html">Home</a>
      <a href="/dashboard.html">Dashboard</a>
      <a href="/about.html">About</a>

    </div>
  </nav>

  <div class="center">

    <h1>Track Active Wildfires in Real Time</h1>
    <p class="subtitle">
      Real time NASA satellite fire data and saved locations
      in an interactive dashboard.
    </p>

    <div class="fire-box">
      <p class="fire-title">ACTIVE FIRES DETECTED</p>
      <p class="fire-count" id="fire-count">...</p>
      <p class="fire-sub">Updated via NASA FIRMS</p>
    </div>

    <a href="/dashboard.html" class="btn">Open Dashboard</a>
  </div>

  <script>
    fetch("/api/fires")
      .then(res =>res.json())
      .then(data =>{document.getElementById("fire-count").textContent = data.length;})
  </script>
</body>
</html>
